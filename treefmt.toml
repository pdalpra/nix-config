[formatter.cabal]
command = "cabal-fmt"
options = ["-i"]
includes = ["*.cabal"]

[formatter.json]
command = "jfmt"
options = ["-i"]
includes = ["*.json"]

[formatter.haskell]
command = "fourmolu"
options = ["-i"]
includes = ["*.hs"]

[formatter.nix]
command = "nix"
options = ["fmt"]
includes = ["*.nix"]

