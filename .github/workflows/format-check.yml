name: "Check that all files are formatted"
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v2.4.0
      - name: "Install Nix"
        uses: cachix/install-nix-action@v16
      - name: "Check that all sources are properly formatted"
        run: "treefmt --fail-on-change"